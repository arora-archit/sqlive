name: Build

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build binaries and upload artifacts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Set extension for Windows
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then echo "EXT=.exe" >> $GITHUB_ENV; else echo "EXT=" >> $GITHUB_ENV; fi

      - name: Build binary
        run: |
          mkdir -p dist
          env GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -o dist/sqlive-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} -ldflags="-s -w" ./

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sqlive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/sqlive-${{ matrix.goos }}-${{ matrix.goarch }}*